<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>匠心传承 - 非遗匠心展示平台</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "Microsoft YaHei", sans-serif;
			}

			:root {
				--primary: #8B4513;
				--secondary: #D2B48C;
				--dark: #333;
				--light: #fff;
				--gray: #f5f5f5;
			}

			body {
				line-height: 1.6;
				color: var(--dark);
				background: var(--gray);
			}

			.navbar {
				background: var(--primary);
				padding: 15px 0;
				position: sticky;
				top: 0;
				z-index: 100;
			}

			.container {
				width: 90%;
				max-width: 1200px;
				margin: 0 auto;
			}

			.nav-container {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.logo {
				color: var(--light);
				font-size: 24px;
				font-weight: bold;
			}

			.nav-menu {
				display: flex;
				list-style: none;
			}

			.nav-menu li {
				margin-left: 30px;
			}

			.nav-menu a {
				color: var(--light);
				text-decoration: none;
				font-size: 16px;
				transition: 0.3s;
			}

			.nav-menu a:hover {
				color: var(--secondary);
			}

			.header {
				padding: 60px 0;
				text-align: center;
				background: var(--light);
			}

			.header h1 {
				font-size: 36px;
				color: var(--primary);
				margin-bottom: 15px;
			}

			.header p {
				font-size: 18px;
				color: #555;
			}

			.section-title {
				text-align: center;
				margin: 50px 0 30px;
				font-size: 32px;
				color: var(--primary);
				position: relative;
			}

			.section-title::after {
				content: '';
				width: 80px;
				height: 3px;
				background: var(--secondary);
				position: absolute;
				bottom: -10px;
				left: 50%;
				transform: translateX(-50%);
			}

			.craftsman {
				padding: 50px 0;
				background: var(--light);
			}

			.card-box {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
				gap: 30px;
			}

			.card {
				background: var(--light);
				border-radius: 10px;
				overflow: hidden;
				box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
				transition: 0.3s;
			}

			.card:hover {
				transform: translateY(-5px);
			}

			.card img {
				width: 100%;
				height: 200px;
				object-fit: cover;
			}

			.card-body {
				padding: 20px;
			}

			.card-title {
				font-size: 20px;
				margin-bottom: 10px;
				color: var(--primary);
			}

			.card-text {
				color: #666;
				font-size: 14px;
			}

			.footer {
				background: var(--primary);
				color: var(--light);
				text-align: center;
				padding: 30px 0;
				margin-top: 50px;
			}
		</style>
	</head>
	<body>
		<nav class="navbar">
			<div class="container nav-container">
				<div class="logo">非遗匠心</div>
				<ul class="nav-menu">
					<li><a href="index.html">首页</a></li>
					<li><a href="非遗项目展示.html">非遗展示</a></li>
					<li><a href="数字展厅模块.html">数字展厅</a></li>
					<li><a href="匠心传承模块.html">匠心传承</a></li>
					<li><a href="新闻资讯.html">新闻资讯</a></li>
				</ul>
			</div>
		</nav>

		<div class="header">
			<div class="container">
				<h1>匠心传承</h1>
				<p>致敬匠人，传承技艺，让非遗文化在新时代生生不息</p>
			</div>
		</div>

		<section class="craftsman">
			<div class="container">
				<div class="card-box">
					<a href="传承人报告.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://img0.baidu.com/it/u=161232417,4212567809&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=667" alt="非遗传承人专题报告">
						<div class="card-body">
							<h3 class="card-title">非遗传承人专题报告</h3>
							<p class="card-text">深度访谈非遗传承人，记录他们的技艺人生与坚守故事。</p>
						</div>
					</a>
					<a href="线上教学.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://img2.baidu.com/it/u=1722103000,202330000&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=667" alt="非遗线上体验教学">
						<div class="card-body">
							<h3 class="card-title">非遗线上体验教学</h3>
							<p class="card-text">非遗传承人亲自授课，提供高清视频课程，足不出户学习传统技艺。</p>
						</div>
					</a>
					<a href="文创产品.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://img2.baidu.com/it/u=2468135790,1357902468" alt="非遗文创产品展示与推广">
						<div class="card-body">
							<h3 class="card-title">非遗文创产品展示与推广</h3>
							<p class="card-text">汇聚全国优秀非遗文创产品，搭建展示与推广平台。</p>
						</div>
					</a>
				</div>
			</div>
		</section>

		<footer class="footer">
			<div class="container">
				<p>非遗匠心·传统文化数字化展示平台 © 2026 版权所有</p>
				<p>传承中华优秀传统文化 · 推动非遗数字化保护与传播</p>
			</div>
		</footer>
	</body>
</html>
