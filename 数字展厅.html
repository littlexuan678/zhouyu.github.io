<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>数字展厅 - 非遗匠心展示平台</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "Microsoft YaHei", sans-serif;
			}

			:root {
				--primary: #8B4513;
				--secondary: #D2B48C;
				--dark: #333;
				--light: #fff;
				--gray: #f5f5f5;
			}

			body {
				line-height: 1.6;
				color: var(--dark);
				background: var(--gray);
			}

			.navbar {
				background: var(--primary);
				padding: 15px 0;
				position: sticky;
				top: 0;
				z-index: 100;
			}

			.container {
				width: 90%;
				max-width: 1200px;
				margin: 0 auto;
			}

			.nav-container {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.logo {
				color: var(--light);
				font-size: 24px;
				font-weight: bold;
			}

			.nav-menu {
				display: flex;
				list-style: none;
			}

			.nav-menu li {
				margin-left: 30px;
			}

			.nav-menu a {
				color: var(--light);
				text-decoration: none;
				font-size: 16px;
				transition: 0.3s;
			}

			.nav-menu a:hover {
				color: var(--secondary);
			}

			.header {
				padding: 60px 0;
				text-align: center;
				background: var(--light);
			}

			.header h1 {
				font-size: 36px;
				color: var(--primary);
				margin-bottom: 15px;
			}

			.header p {
				font-size: 18px;
				color: #555;
			}

			.section-title {
				text-align: center;
				margin: 50px 0 30px;
				font-size: 32px;
				color: var(--primary);
				position: relative;
			}

			.section-title::after {
				content: '';
				width: 80px;
				height: 3px;
				background: var(--secondary);
				position: absolute;
				bottom: -10px;
				left: 50%;
				transform: translateX(-50%);
			}

			.digital {
				padding: 50px 0;
				background: var(--light);
			}

			.card-box {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
				gap: 30px;
			}

			.card {
				background: var(--light);
				border-radius: 10px;
				overflow: hidden;
				box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
				transition: 0.3s;
			}

			.card:hover {
				transform: translateY(-5px);
			}

			.card img {
				width: 100%;
				height: 200px;
				object-fit: cover;
			}

			.card-body {
				padding: 20px;
			}

			.card-title {
				font-size: 20px;
				margin-bottom: 10px;
				color: var(--primary);
			}

			.card-text {
				color: #666;
				font-size: 14px;
			}

			.footer {
				background: var(--primary);
				color: var(--light);
				text-align: center;
				padding: 30px 0;
				margin-top: 50px;
			}
		</style>
	</head>
	<body>
		<nav class="navbar">
			<div class="container nav-container">
				<div class="logo">非遗匠心</div>
				<ul class="nav-menu">
					<li><a href="index.html">首页</a></li>
					<li><a href="非遗项目展示.html">非遗展示</a></li>
					<li><a href="数字展厅模块.html">数字展厅</a></li>
					<li><a href="匠心传承.html">匠心传承</a></li>
					<li><a href="新闻资讯.html">新闻资讯</a></li>
				</ul>
			</div>
		</nav>

		<div class="header">
			<div class="container">
				<h1>数字展厅</h1>
				<p>以数字技术为翼，让非遗文化跨越时空，触手可及</p>
			</div>
		</div>

		<section class="digital">
			<div class="container">
				<div class="card-box">
					<a href="数字展厅.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://img2.baidu.com/it/u=1102462770,390055216&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=667" alt="VR非遗展示">
						<div class="card-body">
							<h3 class="card-title">VR非遗展示</h3>
							<p class="card-text">沉浸式体验非遗制作全过程，感受传统工艺的魅力与乐趣。</p>
						</div>
					</a>
					<a href="短视频展播.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://img1.baidu.com/it/u=1357924680,2468013579" alt="非遗短视频与微纪录片">
						<div class="card-body">
							<h3 class="card-title">非遗短视频与微纪录片</h3>
							<p class="card-text">用镜头记录非遗之美，让非遗文化触手可及，生动有趣。</p>
						</div>
					</a>
					<a href="融合案例.html" class="card" style="text-decoration: none; color: inherit;">
						<img src="https://pic.baike.soso.com/ugc/baikepic2/25802/cut-20220421160224-1443519694_png_1200_675.jpg/0" alt="非遗与现代化融合案例">
						<div class="card-body">
							<h3 class="card-title">非遗与现代化融合案例</h3>
							<p class="card-text">展示非遗在现代设计、科技、文旅等领域的创新应用案例。</p>
						</div>
					</a>
				</div>
			</div>
		</section>

		<footer class="footer">
			<div class="container">
				<p>非遗匠心·传统文化数字化展示平台 © 2026 版权所有</p>
				<p>传承中华优秀传统文化 · 推动非遗数字化保护与传播</p>
			</div>
		</footer>
	</body>
</html>
